server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    # SPA: todas las rutas resuelven al index
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API del backend (incluye SSE en /api/v1/admin/live-feed y MJPEG en /camara/stream)
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;            # imprescindible para SSE y MJPEG
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Fotos servidas por el backend (rostros enrolados y capturas)
    location /uploads/ {
        proxy_pass http://backend:5000;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://backend:5000;
    }
}
